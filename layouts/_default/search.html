{{ define "main" }}
<section class="page-hero">
  <div class="container narrow">
    <p class="eyebrow">Search</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}<p class="page-description">{{ . }}</p>{{ end }}
  </div>
</section>

<section class="section">
  <div class="container search-layout">
    <label class="search-box">
      <span>搜索研究内容</span>
      <input id="research-search" type="search" placeholder="输入标题、标签、分类或正文关键词" autocomplete="off">
    </label>
    <div id="search-results" class="latest-research-list" aria-live="polite"></div>
  </div>
</section>

<script>
const input = document.getElementById("research-search");
const results = document.getElementById("search-results");
let searchIndex = [];

function normalize(value) {
  return String(value || "").toLowerCase().trim();
}

function score(item, terms) {
  const title = normalize(item.title);
  const summary = normalize(item.summary);
  const tags = normalize((item.tags || []).join(" "));
  const categories = normalize((item.categories || []).join(" "));
  const content = normalize(item.content);
  let total = 0;

  terms.forEach(term => {
    if (title.includes(term)) total += 8;
    if (tags.includes(term)) total += 6;
    if (categories.includes(term)) total += 6;
    if (summary.includes(term)) total += 4;
    if (content.includes(term)) total += 2;
  });

  return total;
}

function render(items) {
  if (!items.length) {
    results.innerHTML = '<p class="empty-state">没有找到匹配内容。</p>';
    return;
  }

  results.innerHTML = items.map(item => {
    const categories = (item.categories || []).join(" / ") || "Research";
    return `
      <article class="latest-research-item">
        <a href="${item.url}">
          <div>
            <div class="card-kicker"><span>${categories}</span></div>
            <h3>${item.title}</h3>
            ${item.summary ? `<p>${item.summary}</p>` : ""}
          </div>
          <time>${item.date || ""}</time>
        </a>
      </article>
    `;
  }).join("");
}

function runSearch() {
  const terms = normalize(input.value).split(/\s+/).filter(Boolean);
  if (!terms.length) {
    render(searchIndex.slice(0, 10));
    return;
  }

  render(searchIndex
    .map(item => ({ item, rank: score(item, terms) }))
    .filter(result => result.rank > 0)
    .sort((a, b) => b.rank - a.rank)
    .map(result => result.item));
}

fetch("{{ "index.json" | relLangURL }}")
  .then(response => response.json())
  .then(data => {
    searchIndex = Array.isArray(data) ? data : [];
    render(searchIndex.slice(0, 10));
  })
  .catch(() => {
    results.innerHTML = '<p class="empty-state">搜索索引加载失败。</p>';
  });

input.addEventListener("input", runSearch);
</script>
{{ end }}
