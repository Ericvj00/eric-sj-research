<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ .Site.Home.RelPermalink }}" aria-label="Eric SJ Research">
      <span class="brand-mark">ESJ</span>
      <span>Eric SJ Research</span>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      <div class="nav-group">
        <a href="{{ "web3/" | relLangURL }}">Web3</a>
        <div class="nav-submenu" aria-label="Web3 categories">
          <span>板块研究</span>
          <span>链上财报</span>
          <span>项目分析</span>
          <span>逻辑拆解</span>
        </div>
      </div>
      <div class="nav-group">
        <a href="{{ "stocks/" | relLangURL }}">美股</a>
        <div class="nav-submenu" aria-label="Stocks categories">
          <span>财报分析</span>
          <span>个股研究</span>
          <span>产业报告</span>
        </div>
      </div>
      <a href="{{ "guides/" | relLangURL }}">自用工具</a>
      <a href="{{ "about/" | relLangURL }}">关于</a>
    </nav>
    <nav class="language-switcher" aria-label="Language switcher">
      {{ range .AllTranslations }}
        <a class="{{ if eq .Lang $.Lang }}is-active{{ end }}" href="{{ .RelPermalink }}">{{ .Site.Language.Label }}</a>
      {{ end }}
    </nav>
  </div>
</header>
