<header class="site-header">
  <div class="container header-inner">
    <div class="site-brand" aria-label="Eric SJ Research">
      <a class="brand-mark" href="https://x.com/sjbtc9" target="_blank" rel="noopener noreferrer" aria-label="Eric SJ on X">
        <img src="{{ "images/logos/avatar.jpg" | relURL }}" alt="Eric SJ">
      </a>
      <a class="brand-name" href="{{ .Site.Home.RelPermalink }}" aria-label="Eric SJ Research homepage">Eric SJ Research</a>
    </div>
    <nav class="site-nav" aria-label="Main navigation">
      <div class="nav-group">
        <a href="{{ "web3/" | relLangURL }}">Web3</a>
        <div class="nav-submenu" aria-label="Web3 categories">
          <a href="{{ "web3/sector/" | relLangURL }}">板块研究</a>
          <a href="{{ "web3/onchain-financials/" | relLangURL }}">链上财报</a>
          <a href="{{ "web3/projects/" | relLangURL }}">项目分析</a>
          <a href="{{ "web3/thesis/" | relLangURL }}">逻辑拆解</a>
        </div>
      </div>
      <div class="nav-group">
        <a href="{{ "stocks/" | relLangURL }}">美股</a>
        <div class="nav-submenu" aria-label="Stocks categories">
          <a href="{{ "stocks/earnings/" | relLangURL }}">财报分析</a>
          <a href="{{ "stocks/company/" | relLangURL }}">个股研究</a>
          <a href="{{ "stocks/industry/" | relLangURL }}">产业报告</a>
        </div>
      </div>
      <a href="{{ "guides/" | relLangURL }}">自用工具</a>
      <a href="{{ "about/" | relLangURL }}">关于</a>
    </nav>
    <nav class="language-switcher" aria-label="Language switcher">
      {{ range .AllTranslations }}
        <a class="{{ if eq .Lang $.Lang }}is-active{{ end }}" href="{{ .RelPermalink }}">{{ .Site.Language.Label }}</a>
      {{ end }}
    </nav>
  </div>
</header>
