{{- $pages := .pages | default slice -}}
{{- $isTW := .isTW | default false -}}
{{- $emptyText := .emptyText | default (cond $isTW "繁體內容正在準備中。" "重点研究内容正在准备中。") -}}
<div class="research-carousel" data-research-carousel>
  <button class="research-carousel-arrow research-carousel-prev" type="button" data-carousel-prev aria-label="{{ if $isTW }}向左滑動{{ else }}向左滑动{{ end }}" hidden>‹</button>
  <div class="research-carousel-track" data-carousel-track aria-label="{{ if $isTW }}精選研究文章{{ else }}精选研究文章{{ end }}" tabindex="0">
    {{ range $index, $page := first 9 $pages }}
      <div class="research-carousel-card" data-carousel-index="{{ $index }}">
        {{ partial "article-card.html" $page }}
      </div>
    {{ else }}
      <p class="empty-state">{{ $emptyText }}</p>
    {{ end }}
  </div>
  <button class="research-carousel-arrow research-carousel-next" type="button" data-carousel-next aria-label="{{ if $isTW }}向右滑動{{ else }}向右滑动{{ end }}">›</button>
  <p class="research-carousel-status" data-carousel-status aria-live="polite"></p>
</div>
<script>
(() => {
  const script = document.currentScript;
  const root = script && script.previousElementSibling;
  if (!root || !root.matches("[data-research-carousel]")) return;
  const track = root.querySelector("[data-carousel-track]");
  const cards = Array.from(root.querySelectorAll("[data-carousel-index]"));
  const previous = root.querySelector("[data-carousel-prev]");
  const next = root.querySelector("[data-carousel-next]");
  const status = root.querySelector("[data-carousel-status]");
  if (!track || !cards.length || !previous || !next) return;

  const compact = window.matchMedia("(max-width: 900px)");
  let scrollFrame = 0;
  const update = () => {
    const tolerance = 4;
    const atStart = track.scrollLeft <= tolerance;
    const atEnd = track.scrollLeft + track.clientWidth >= track.scrollWidth - tolerance;
    previous.hidden = atStart;
    previous.disabled = atStart;
    next.hidden = atEnd;
    next.disabled = atEnd;

    if (status) {
      const gap = parseFloat(getComputedStyle(track).columnGap || getComputedStyle(track).gap || "0");
      const step = cards[0].getBoundingClientRect().width + gap;
      const start = step > 0 ? Math.round(track.scrollLeft / step) : 0;
      const visible = compact.matches ? 1 : 3;
      const end = Math.min(start + visible, cards.length);
      status.textContent = `{{ if $isTW }}目前顯示第{{ else }}当前显示第{{ end }} ${start + 1}-${end} {{ if $isTW }}篇，共{{ else }}篇，共{{ end }} ${cards.length} {{ if $isTW }}篇{{ else }}篇{{ end }}`;
    }
  };
  const requestUpdate = () => {
    cancelAnimationFrame(scrollFrame);
    scrollFrame = requestAnimationFrame(update);
  };
  const scrollGroup = direction => {
    const gap = parseFloat(getComputedStyle(track).columnGap || getComputedStyle(track).gap || "0");
    const step = cards[0].getBoundingClientRect().width + gap;
    const groupSize = compact.matches ? 1 : 3;
    const currentIndex = step > 0 ? Math.round(track.scrollLeft / step) : 0;
    const currentGroup = Math.round(currentIndex / groupSize);
    const maxStart = Math.max(0, cards.length - groupSize);
    const targetIndex = Math.max(0, Math.min((currentGroup + direction) * groupSize, maxStart));
    track.scrollTo({ left: targetIndex * step, behavior: "smooth" });
  };

  previous.addEventListener("click", () => scrollGroup(-1));
  next.addEventListener("click", () => scrollGroup(1));
  track.addEventListener("scroll", requestUpdate, { passive: true });

  let dragging = false;
  let dragged = false;
  let dragStartX = 0;
  let dragStartScroll = 0;
  track.addEventListener("pointerdown", event => {
    if (event.pointerType !== "mouse" || event.button !== 0) return;
    dragging = true;
    dragged = false;
    dragStartX = event.clientX;
    dragStartScroll = track.scrollLeft;
    track.setPointerCapture(event.pointerId);
    track.classList.add("is-dragging");
  });
  track.addEventListener("pointermove", event => {
    if (!dragging) return;
    const distance = event.clientX - dragStartX;
    if (Math.abs(distance) > 5) dragged = true;
    track.scrollLeft = dragStartScroll - distance;
    if (dragged) event.preventDefault();
  });
  const finishDrag = event => {
    if (!dragging) return;
    dragging = false;
    track.classList.remove("is-dragging");
    if (track.hasPointerCapture(event.pointerId)) track.releasePointerCapture(event.pointerId);
    requestUpdate();
    if (dragged) window.setTimeout(() => { dragged = false; }, 0);
  };
  track.addEventListener("pointerup", finishDrag);
  track.addEventListener("pointercancel", finishDrag);
  track.addEventListener("click", event => {
    if (!dragged) return;
    event.preventDefault();
    event.stopPropagation();
    dragged = false;
  }, true);
  compact.addEventListener("change", () => {
    track.scrollTo({ left: 0, behavior: "auto" });
    requestUpdate();
  });
  window.addEventListener("resize", requestUpdate, { passive: true });
  update();
})();
</script>
