  <script>
  (() => {
    const input = document.getElementById("section-search");
    const results = document.getElementById("section-results");
    if (!input || !results) return;
    const cards = Array.from(results.querySelectorAll(".research-article-card"));
    const normalize = value => String(value || "").toLowerCase().trim();
    const empty = document.createElement("p");
    empty.className = "empty-state";
    empty.textContent = "没有找到匹配内容。";

    input.addEventListener("input", () => {
      const terms = normalize(input.value).split(/\s+/).filter(Boolean);
      let visible = 0;
      cards.forEach(card => {
        const matches = terms.every(term => normalize(card.dataset.search).includes(term));
        card.hidden = !matches;
        if (matches) visible += 1;
      });
      if (visible) empty.remove();
      else if (!empty.isConnected) results.appendChild(empty);
    });
  })();
  </script>
